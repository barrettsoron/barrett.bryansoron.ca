	<!-- Footer -->
	<text x="14" y="350" font-family="'Noto Serif', Georgia, serif" font-size="12" font-style="italic" fill="#8a8a92">Chosen items held deliberately. Drift items shipped generative-AI defaults mid-campaign.</text>
