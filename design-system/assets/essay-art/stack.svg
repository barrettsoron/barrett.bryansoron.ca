&#x9;<title id="stack-title">The campaign tech stack: chosen and drifted</title>
&#x9;<desc id="stack-desc">A block diagram of the Avi Lewis leadership campaign tech stack from September 2025 through March 2026. Four tools we chose deliberately (solidarity.tech, bespoke Astro site, individual AI tools, bespoke data integrations) sit above four tools that shipped generative-AI features underneath us during the campaign (Google Workspace with Gemini, Asana with Intelligence, Zoom with AI Companion, Canva with Magic Studio).</desc>

