&#x9;<title id="drift-title">Platform drift — September 2025 through March 2026</title>
&#x9;<desc id="drift-desc">A timeline of generative-AI features that shipped into four tools (Canva, Zoom, Asana, Google Workspace) during the Avi Lewis leadership campaign, plus the Otter.ai class action filed just before the window opens. Dots mark discrete platform events; the Google row shows an ambient band representing gradual default rollout of Gemini across Workspace.</desc>

