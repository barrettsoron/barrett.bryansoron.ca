<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Spacing — Scale</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { max-width: none; padding: 18px 22px; background: #0b0b0d; }
  .scale { display: grid; gap: 8px; }
  .row { display: grid; grid-template-columns: 56px 1fr 70px; align-items: center; gap: 14px; font-family: var(--font-mono); font-size: 12px; color: #8a8a92; font-feature-settings: "tnum" 1; }
  .bar { height: 8px; background: #10b981; border-radius: 1px; }
  .tag { color: #ededed; }
  .px  { text-align: right; }
</style>
</head>
<body>
<div class="scale">
  <div class="row"><span class="tag">--s-1</span><div class="bar" style="width:4px"></div><span class="px">4px</span></div>
  <div class="row"><span class="tag">--s-2</span><div class="bar" style="width:8px"></div><span class="px">8px</span></div>
  <div class="row"><span class="tag">--s-3</span><div class="bar" style="width:12px"></div><span class="px">12px</span></div>
  <div class="row"><span class="tag">--s-4</span><div class="bar" style="width:16px"></div><span class="px">16px</span></div>
  <div class="row"><span class="tag">--s-5</span><div class="bar" style="width:20px"></div><span class="px">20px</span></div>
  <div class="row"><span class="tag">--s-6</span><div class="bar" style="width:28px"></div><span class="px">28px</span></div>
  <div class="row"><span class="tag">--s-7</span><div class="bar" style="width:40px"></div><span class="px">40px</span></div>
  <div class="row"><span class="tag">--s-8</span><div class="bar" style="width:56px"></div><span class="px">56px</span></div>
  <div class="row"><span class="tag">--s-9</span><div class="bar" style="width:96px"></div><span class="px">96px</span></div>
</div>
</body>
</html>
