<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Component — Admonitions &amp; callout</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { max-width: none; padding: 16px 24px; background: #0b0b0d; font-family: var(--font-sans); color: #ededed; }
  .ad { padding-top: 10px; margin-bottom: 18px; }
  .ad .lbl { display: block; font-family: var(--font-mono); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.18em; margin: 0 0 6px; }
  .ad p { margin: 0; font-size: 14px; line-height: 1.55; }
  .note   { border-top: 2px solid #5a8bd6; }
  .note .lbl { color: #8ab2ea; }
  .caveat { border-top: 2px solid #10b981; }
  .caveat .lbl { color: #10b981; }

  .callout {
    margin: 18px 0 4px;
    padding: 18px 16px;
    border-top: 1px solid #0a8d65;
    border-bottom: 1px solid #0a8d65;
    text-align: center;
    font-family: "Noto Serif", Georgia, serif;
    font-style: italic;
    font-size: 16px;
    color: #ededed;
  }
</style>
</head>
<body>
<aside class="ad note"><span class="lbl">Scope</span><p>Applies to side projects and personal writing — not the rest of the calendar.</p></aside>
<aside class="ad caveat"><span class="lbl">Caveat</span><p>None of this scales to a team. These are habits for solo work.</p></aside>
<div class="callout">Consistency is the long game's only cheat code.</div>
</body>
</html>
