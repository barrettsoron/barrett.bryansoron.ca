<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Component — TOC colophon</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { max-width: none; padding: 18px 26px; background: #0b0b0d; }
  .toc { padding: 0 0 12px; border-bottom: 1px solid #0a8d65; font-size: 15px; max-width: 480px; }
  .toc-label {
    display: flex; align-items: center; gap: 14px;
    margin: 0 0 10px; padding: 0;
    font-family: var(--font-mono); font-size: 12px; font-weight: 700;
    line-height: 1.45; text-transform: uppercase; letter-spacing: 0.18em;
    color: #10b981;
  }
  .toc-label::after { content: ""; flex: 1; height: 1px; background: #0a8d65; align-self: center; }
  .toc-list { list-style: none; padding: 0; margin: 0; }
  .toc-item a { display: block; padding: 5px 0; color: #ededed; text-decoration: none; font-family: var(--font-sans); }
  .toc-item--sub { position: relative; padding-left: 1.5rem; font-style: italic; }
  .toc-item--sub a { color: #8a8a92; }
  .toc-item--sub::before {
    content: ""; position: absolute; left: 0; top: 16px;
    width: 12px; height: 1px; background: #0a8d65;
  }
</style>
</head>
<body>
<nav class="toc" aria-label="Contents">
  <p class="toc-label">Contents</p>
  <ul class="toc-list">
    <li class="toc-item"><a href="#">The premise</a></li>
    <li class="toc-item"><a href="#">The weekly shape</a></li>
    <li class="toc-item toc-item--sub"><a href="#">What counts as a block</a></li>
    <li class="toc-item"><a href="#">Tools, briefly</a></li>
    <li class="toc-item"><a href="#">Reading rhythm</a></li>
  </ul>
</nav>
</body>
</html>
