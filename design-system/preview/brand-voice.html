<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Brand — Voice specimen</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { max-width: none; padding: 18px 26px; background: #0b0b0d; color: #ededed; }
  .lbl { font-family: var(--font-mono); font-size: 11px; color: #10b981; letter-spacing: 0.18em; text-transform: uppercase; margin: 0 0 10px; font-weight: 700; }
  blockquote {
    margin: 0;
    padding: 2px 0 2px 18px;
    border-left: 2px solid #0a8d65;
    color: #ededed;
    font-family: "Noto Serif", Georgia, serif;
    font-style: italic;
    font-size: 16px;
    line-height: 1.7;
  }
  blockquote + blockquote { margin-top: 12px; color: #8a8a92; }
  .cite { font-family: var(--font-mono); font-size: 11px; color: #8a8a92; margin-top: 8px; }
  .cite strong { color: #ededed; font-weight: 700; }
</style>
</head>
<body>
<p class="lbl">Voice</p>
<blockquote>"Both things are true: Proton's model is more private, and Fastmail's is more workable. I picked one."</blockquote>
<blockquote>"Most writing worth doing is bag-shaped. You gather things. You carry them home."</blockquote>
<p class="cite">— <strong>plainspoken</strong>, declarative, both sides of the trade-off · sentence case · no emoji</p>
</body>
</html>
