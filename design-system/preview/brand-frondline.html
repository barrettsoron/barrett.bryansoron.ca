<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Brand — Frondline mark</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { max-width: none; padding: 18px 26px; background: #0b0b0d; font-family: var(--font-sans); color: #ededed; }
  .row { display: grid; grid-template-columns: 96px 1fr 96px; gap: 22px; align-items: center; }
  .swatch { display: flex; align-items: center; justify-content: center; height: 96px; border: 1px solid #24242a; border-radius: 4px; }
  .swatch.light { background: #ededed; border-color: #ededed; }
  .swatch img { width: 56px; height: 56px; }
  .meta h3 { font-size: 18px; margin: 0 0 6px; letter-spacing: -0.01em; font-weight: 700; }
  .meta p  { font-size: 13px; color: #8a8a92; margin: 0 0 4px; line-height: 1.55; }
  .meta code { font-family: var(--font-mono); font-size: 12px; background: #121216; padding: 1px 6px; border-radius: 3px; color: #ededed; }
</style>
</head>
<body>
<div class="row">
  <div class="swatch"><img src="../assets/frondline-icon.svg" alt="frondline" /></div>
  <div class="meta">
    <h3>Frondline</h3>
    <p>A stylised fiddlehead. The single brand mark — favicon, app icon, deck cover. Not a logotype.</p>
    <p><code>assets/frondline-icon.svg</code></p>
  </div>
  <div class="swatch light"><img src="../assets/frondline-icon.svg" alt="frondline" /></div>
</div>
</body>
</html>
