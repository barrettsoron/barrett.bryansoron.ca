<title>Type — Essay body</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { max-width: none; padding: 18px 26px; background: #0b0b0d; }
  .col { max-width: 540px; }
  h3 { font-family: var(--font-sans); font-weight: 700; letter-spacing: -0.01em; font-size: 18px; color: #ededed; margin: 0 0 10px; }
  p { font-family: "Noto Serif", Georgia, serif; font-size: 17px; line-height: 1.75; color: #ededed; margin: 0 0 10px; }
  p em { font-style: italic; }
  p a { color: #ededed; text-decoration: underline; text-decoration-color: #0a8d65; text-decoration-thickness: 2px; text-underline-offset: 0.22em; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: #8a8a92; letter-spacing: 0.02em; margin-top: 4px; }
</style>
</head>
<body>
<div class="col">
  <h3>The shape of stories</h3>
  <p>The dominant shape of Western storytelling is the spear — a protagonist, a conflict, a killing, a return. But the older and more human technology, she says, is the <em>bag</em>. The container that lets us carry home what we gathered.</p>
  <p class="meta">Noto Serif · 17 / 1.75 · accent-dim underlines</p>
</div>
</body>
