<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Type — Three families</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { max-width: none; padding: 20px 24px; background: #0b0b0d; }
  .stack { display: grid; gap: 18px; }
  .row { display: grid; grid-template-columns: 90px 1fr; align-items: baseline; gap: 18px; }
  .tag { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: #8a8a92; }
  .sans  { font-family: var(--font-sans);  font-size: 28px; font-weight: 700; letter-spacing: -0.02em; color: #ededed; margin: 0; }
  .serif { font-family: var(--font-serif); font-size: 24px; font-style: italic;  color: #ededed; margin: 0; }
  .mono  { font-family: var(--font-mono);  font-size: 20px; color: #ededed; font-feature-settings: "tnum" 1; margin: 0; }
  .note  { font-family: var(--font-mono); font-size: 11px; color: #8a8a92; }
</style>
</head>
<body>
<div class="stack">
  <div class="row">
    <span class="tag">BC Sans</span>
    <p class="sans">Held to human terms.</p>
  </div>
  <div class="row">
    <span class="tag">Noto Serif</span>
    <p class="serif">Most writing worth doing is bag-shaped.</p>
  </div>
  <div class="row">
    <span class="tag">Noto Mono</span>
    <p class="mono">2026-04-21 · v0.0.1</p>
  </div>
</div>
</body>
</html>
