<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Type — Heading scale</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { max-width: none; padding: 18px 24px; background: #0b0b0d; }
  .scale { display: grid; gap: 8px; }
  .line { display: grid; grid-template-columns: 56px 1fr 90px; align-items: baseline; gap: 16px; }
  .tag  { font-family: var(--font-mono); font-size: 11px; color: #8a8a92; letter-spacing: 0.02em; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: #8a8a92; text-align: right; font-feature-settings: "tnum" 1; }
  .h1 { font-family: var(--font-sans); font-weight: 700; letter-spacing: -0.025em; font-size: 30px; color: #ededed; margin: 0; line-height: 1.2; }
  .h2 { font-family: var(--font-sans); font-weight: 700; letter-spacing: -0.02em;  font-size: 21px; color: #ededed; margin: 0; line-height: 1.25; }
  .h3 { font-family: var(--font-sans); font-weight: 700; letter-spacing: -0.01em;  font-size: 18px; color: #ededed; margin: 0; line-height: 1.3; }
  .h4 { font-family: var(--font-sans); font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; font-size: 14px; color: #8a8a92; margin: 0; }
</style>
</head>
<body>
<div class="scale">
  <div class="line"><span class="tag">h1</span><h1 class="h1">A quieter internet</h1><span class="meta">30 / 1.25</span></div>
  <div class="line"><span class="tag">h2</span><h2 class="h2">The shape of attention</h2><span class="meta">21 / 1.25</span></div>
  <div class="line"><span class="tag">h3</span><h3 class="h3">What counts as a block</h3><span class="meta">18 / 1.3</span></div>
  <div class="line"><span class="tag">h4</span><h4 class="h4">Scope · uppercase eyebrow</h4><span class="meta">14 / .08em</span></div>
</div>
</body>
</html>
