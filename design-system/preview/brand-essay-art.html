<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Brand — Essay art</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { max-width: none; padding: 16px 22px; background: #0b0b0d; font-family: var(--font-sans); color: #ededed; }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }
  .card { background: #121216; border: 1px solid #24242a; border-radius: 4px; padding: 12px 12px 10px; }
  .frame { display: flex; align-items: center; justify-content: center; height: 110px; }
  .frame img { max-height: 100px; max-width: 100%; }
  .meta { display: flex; justify-content: space-between; align-items: baseline; margin-top: 6px; }
  .name { font-size: 13px; letter-spacing: -0.01em; font-weight: 700; }
  .path { font-family: var(--font-mono); font-size: 10.5px; color: #8a8a92; }
</style>
</head>
<body>
<div class="row">
  <div class="card">
    <div class="frame"><img src="../assets/essay-art/drift.svg" alt="drift" /></div>
    <div class="meta"><span class="name">drift</span><span class="path">essay-art/</span></div>
  </div>
  <div class="card">
    <div class="frame"><img src="../assets/essay-art/ladder.svg" alt="ladder" /></div>
    <div class="meta"><span class="name">ladder</span><span class="path">essay-art/</span></div>
  </div>
  <div class="card">
    <div class="frame"><img src="../assets/essay-art/stack.svg" alt="stack" /></div>
    <div class="meta"><span class="name">stack</span><span class="path">essay-art/</span></div>
  </div>
</div>
</body>
</html>
