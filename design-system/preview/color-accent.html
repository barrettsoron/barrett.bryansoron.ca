<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Color — Viridian accent</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { max-width: none; padding: 18px 22px; background: #0b0b0d; }
  .wrap { display: grid; grid-template-columns: 1.1fr 1fr; gap: 16px; align-items: stretch; }
  .block { border-radius: var(--r-3); padding: 16px 18px; min-height: 132px; display: flex; flex-direction: column; justify-content: space-between; }
  .b-accent { background: #10b981; color: #0b0b0d; }
  .b-dim    { background: #0a8d65; color: #0b0b0d; }
  .label { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; margin: 0; }
  .b-accent .label, .b-dim .label { color: #0b0b0d; opacity: 0.7; }
  .pull { font-weight: 700; font-size: 24px; letter-spacing: -0.02em; line-height: 1.15; margin: 0; }
  .meta { display: flex; justify-content: space-between; align-items: baseline; font-family: var(--font-mono); font-size: 12px; font-feature-settings: "tnum" 1; }
  .b-accent .meta, .b-dim .meta { color: #0b0b0d; }
  .note { color: #8a8a92; font-size: 12px; margin: 10px 0 0; }
</style>
</head>
<body>
<div class="wrap">
  <div class="block b-accent">
    <p class="label">Accent · Viridian</p>
    <p class="pull">A single committed accent.</p>
    <div class="meta"><span>--accent</span><span>#10B981</span></div>
  </div>
  <div class="block b-dim">
    <p class="label">Accent · Dim</p>
    <p class="pull">Underlines, rules, ordered-list markers.</p>
    <div class="meta"><span>--accent-dim</span><span>#0A8D65</span></div>
  </div>
</div>
<p class="note">Use as a budget, not a palette. Committed 2026-04-21.</p>
</body>
</html>
