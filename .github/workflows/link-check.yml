name: Link check

on:
  schedule:
    - cron: '17 9 3 * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  linkcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build
      - name: Check links
        id: lychee
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2.9.0
        with:
          args: --no-progress --root-dir "${{ github.workspace }}/dist" 'dist/**/*.html'
          output: ./lychee-report.md
          fail: false
      - name: Upsert link-rot issue
        if: steps.lychee.outputs.exit_code != 0
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- link-check-bot -->';
            const report = fs.readFileSync('lychee-report.md', 'utf8');
            const body = marker + '\n' + report;
            try {
              await github.rest.issues.createLabel({
                owner: context.repo.owner, repo: context.repo.repo,
                name: 'link-rot', color: 'd93f0b',
                description: 'Broken links found by the scheduled link checker',
              });
            } catch (e) { if (e.status !== 422) throw e; }
            const issues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner, repo: context.repo.repo,
              state: 'open', labels: 'link-rot',
            });
            const existing = issues.find(i => i.body && i.body.startsWith(marker));
            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: existing.number, body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo,
                title: 'Link check failures', body, labels: ['link-rot'],
              });
            }
